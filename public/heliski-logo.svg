<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 40" fill="none">
  <!-- Mountain peak + helicopter rotor representing Heliski International -->
  <path d="M10 30 L30 8 L50 30" stroke="#f0ece4" stroke-width="2" stroke-linejoin="round" fill="rgba(240,236,228,.06)" opacity=".85"/>
  <path d="M30 8 L34 14 L26 14 Z" stroke="#f0ece4" stroke-width="1" stroke-linejoin="round" fill="rgba(240,236,228,.15)" opacity=".6"/>
  <!-- Helicopter rotor blades -->
  <line x1="30" y1="8" x2="20" y2="3" stroke="#3b9eea" stroke-width="1.5" stroke-linecap="round" opacity=".7"/>
  <line x1="30" y1="8" x2="40" y2="3" stroke="#3b9eea" stroke-width="1.5" stroke-linecap="round" opacity=".7"/>
  <circle cx="30" cy="8" r="2" fill="#3b9eea" opacity=".9"/>
  <!-- Snowflakes -->
  <circle cx="16" cy="18" r="1" fill="#3b9eea" opacity=".3"/>
  <circle cx="44" cy="16" r="1" fill="#3b9eea" opacity=".25"/>
  <circle cx="36" cy="22" r="1" fill="#3b9eea" opacity=".2"/>
  <!-- Right side: globe/map marker for "International" -->
  <circle cx="80" cy="20" r="12" stroke="#f0ece4" stroke-width="1.5" fill="none" opacity=".5"/>
  <path d="M72 20 L88 20 M80 10 L80 30" stroke="#f0ece4" stroke-width=".7" opacity=".25"/>
  <path d="M73 14 Q80 18 87 14 M73 26 Q80 22 87 26" stroke="#f0ece4" stroke-width=".7" opacity=".25"/>
  <path d="M76 12 Q80 20 76 28 M84 12 Q80 20 84 28" stroke="#f0ece4" stroke-width=".7" opacity=".25"/>
  <!-- Subtle "HELI" text watermark -->
  <text x="96" y="23" font-family="'DM Mono',monospace" font-size="6" fill="rgba(240,236,228,.15)" letter-spacing="1.5">HELI</text>
</svg>
